<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Search — The Panda's Thumb</title>
<link rel="stylesheet" href="/assets/site.css">
<link rel="stylesheet" href="/_pagefind/pagefind-ui.css">
</head>
<body>
<header class="site-header">
<span class="site-name"><a href="/">The Panda's Thumb</a></span>
<span class="site-tagline">Static search — pandasthumb.net</span>
</header>
<main>
<h1 class="post-title">Search</h1>
<p class="post-meta">Search index: <span class="post-author">The Panda's Thumb legacy archive</span></p>
<div class="post-body">
<div id="search"></div>
<noscript>
<p>Search requires JavaScript. You can still browse the archive from <a href="/archives/">/archives/</a>.</p>
</noscript>
</div>
</main>
<script src="/_pagefind/pagefind-ui.js"></script>
<script>
window.addEventListener("DOMContentLoaded", function () {
  new PagefindUI({
    element: "#search",
    showSubResults: true,
    showImages: false,
    excerptLength: 30
  });
});
</script>
</body>
</html>
